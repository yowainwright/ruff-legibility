name: Bug report
description: Report an incorrect diagnostic, crash, or CLI issue.
title: "bug: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: ruff-legibility version
      placeholder: "ruff-legibility 0.3.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "Python 3.14.5"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
