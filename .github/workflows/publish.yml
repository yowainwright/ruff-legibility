name: publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
    environment:
      name: pypi
      url: https://pypi.org/project/ruff-legibility/
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.7.19"
          python-version: "3.14"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Build release artifacts
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          maturin-version: "1.14.1"
          manylinux: "2014"
          args: >-
            --release
            --sdist
            --out dist
            --interpreter python3.14
      - name: Check release artifacts
        run: |
          ls -lh dist
          test -f dist/ruff_legibility-*.tar.gz

          if ! compgen -G "dist/*manylinux*.whl" > /dev/null; then
            echo "Expected a manylinux wheel in dist." >&2
            exit 1
          fi

          if compgen -G "dist/*-linux_*.whl" > /dev/null; then
            echo "Native linux wheels are not publishable to PyPI." >&2
            exit 1
          fi
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          RELEASE_ARGS=()
          if [[ "$VERSION" =~ -(alpha|beta|rc) ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          if gh release view "$VERSION" > /dev/null 2>&1; then
            gh release upload "$VERSION" dist/* --clobber
            exit 0
          fi

          gh release create "$VERSION" dist/* \
            --title "$VERSION" \
            --generate-notes \
            "${RELEASE_ARGS[@]}"
